name: Deploy to Vercel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
        env:
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      
      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
          scope: ${{ secrets.VERCEL_ORG_ID }}
      
      - name: Get deployment URL
        id: deployment-url
        run: |
          DEPLOYMENT_URL=$(echo '${{ steps.deploy.outputs.preview-url }}' | sed 's/https:\/\///')
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: https://$DEPLOYMENT_URL"
      
      - name: Update PR comment with deployment URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { DEPLOYMENT_URL } = process.env;
            const issueNumber = context.issue.number;
            const repo = context.repo;
            
            const commentBody = `🚀 **Preview Deployment Ready!**
            
            Your changes have been deployed to Vercel for preview.
            
            **🔗 Preview URL:** https://${DEPLOYMENT_URL}
            
            **📱 PWA Features:**
            - Installable as a Progressive Web App
            - Offline functionality with service worker
            - Push notifications ready
            
            **🔧 Environment:**
            - React 18 + Vite + Tailwind CSS
            - Firebase Authentication
            - Groq AI API integration
            - PWA optimized
            
            The deployment will be automatically removed when the PR is closed.`;
            
            // Find existing bot comment
            const comments = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issueNumber,
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Preview Deployment Ready')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: issueNumber,
                body: commentBody
              });
            }
        env:
          DEPLOYMENT_URL: ${{ steps.deployment-url.outputs.DEPLOYMENT_URL }}
      
      - name: Post deployment status
        run: |
          echo "✅ Deployment successful!"
          echo "Preview URL: https://${{ steps.deployment-url.outputs.DEPLOYMENT_URL }}"
          echo "Production deployment triggered on main branch"
        if: success()

# Setup instructions (commented for documentation):
# 1. Create Vercel project:
#    - Connect GitHub repo at https://vercel.com/new
#    - Import Myno repository
#    - Configure environment variables from vercel.json
#
# 2. Get Vercel tokens:
#    - VERCEL_TOKEN: Create at https://vercel.com/account/tokens
#    - VERCEL_ORG_ID: Find in Vercel dashboard → Settings → General
#    - VERCEL_PROJECT_ID: Find in project settings → General
#
# 3. Add GitHub secrets:
#    - Go to repo Settings → Secrets and variables → Actions
#    - Add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#    - Add all VITE_* environment variables from vercel.json
#
# 4. First deployment:
#    - Push to main branch triggers production deploy
#    - PRs get preview deployments with unique URLs
#    - All deployments are free on Vercel Hobby plan