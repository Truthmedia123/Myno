description: "Debug exact match test"

prompts:
  - file://prompts/myno_system_prompt.txt

providers:
  - id: mistral:mistral-small
    config:
      apiKey: pEQx16ahYx8GVo5pszMygsCaRXo4lmnd
      temperature: 0.3
      max_tokens: 512

tests:
  - description: "Test EXACT EXAMPLE 4 match - User says 'Anything' with quotes"
    vars:
      user_message: '"Anything"'
    assert:
      - type: contains
        value: "map"
      - type: contains
        value: "picture of places"

  - description: "Test EXACT EXAMPLE 2 match - User asks 'What does 'map' mean?' with quotes"
    vars:
      user_message: '"What does \'map\' mean?"'
    assert:
      - type: contains
        value: "For example"
      - type: contains
        value: "treasure"

  - description: "Test EXACT EXAMPLE 3 match - User says 'I love learning new words!' with quotes"
    vars:
      user_message: '"I love learning new words!"'
    assert:
      - type: contains
        value: "Great"
      - type: contains
        value: "sun"