      - vars: { language: 'Turkish', langCode: 'tr', cefr: 'A2' }
      - vars: { language: 'Greek', langCode: 'el', cefr: 'A2' }
      - vars: { language: 'Arabic', langCode: 'ar', cefr: 'A2' }
      - vars: { language: 'Hindi', langCode: 'hi', cefr: 'A2' }
      - vars: { language: 'Japanese', langCode: 'ja', cefr: 'A2' }
      - vars: { language: 'Korean', langCode: 'ko', cefr: 'A2' }
